# Vanblog — docker-compose 一键部署
#
# 两条路径,任选其一:
#
# 1. 一键脚本(推荐新手):
#      curl -L https://raw.githubusercontent.com/cornworld/vanblog/main/vanblog.sh | bash
#    脚本会自动生成 docker-compose.yml 并启动。
#
# 2. 手动编辑本文件:
#      1) 修改下面 VANBLOG_EMAIL 为你的邮箱
#      2) docker compose up -d
#
# 访问:
#   https://your-domain/         — 前台
#   https://your-domain/admin/   — Astro 管理后台
#   https://your-domain/_/       — pb Admin UI
#
# --- HTTP_ONLY 模式(外置反代用户)---
# 把下面的 VANBLOG_HTTP_ONLY=1 取消注释,然后只发布 :80 端口
# (用你的 Traefik / NPM / Cloudflare Tunnel / 反代 Caddy 终止 TLS 后转给它)
# 反代必须传递 X-Forwarded-Proto: https,否则 canonical URL 会错。
#
# --- 紧急回退(TLS 故障时)---
# 取消注释 ports 8080,重启容器,通过 http://your-ip:8080/admin/ 修复配置
# 或运行: ./vanblog.sh maintenance

services:
  vanblog:
    image: ghcr.io/cornworld/vanblog:prod
    # 本地构建: build: { context: ., target: prod }
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      # 紧急管理端口(默认不开,需要时取消注释):
      # - "8080:8080"
    volumes:
      - pb_data:/pb_data
      - caddy_data:/data/caddy
    environment:
      - VANBLOG_EMAIL=${VANBLOG_EMAIL:-admin@example.com}
      - VANBLOG_CADDY_LOG_LEVEL=${VANBLOG_CADDY_LOG_LEVEL:-warn}
      # HTTP_ONLY 模式:外置反代终止 TLS(取消注释即生效):
      # - VANBLOG_HTTP_ONLY=1
      # pb 内部地址(容器内 127.0.0.1,不需要改):
      # - ASTRO_URL=http://127.0.0.1:4321
      # - PB_URL=http://127.0.0.1:8090

volumes:
  pb_data:
  caddy_data:
